<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
  name="description"
  content="Log in to Nordic Art Archive to manage your artworks, create new entries, and update your collection."
>
  <title>Login | Nordic Art Archive</title>
  <link rel="stylesheet" href="../styles/style.css" />
  <script type="module" src="../js/main.js" defer></script>
</head>
<body data-page="login">
  <header class="site-header">
    <div class="container header-inner">
      <a href="../index.html" class="brand" aria-label="Nordic Art Archive home">
        <span class="brand-mark">N</span>
        <span class="brand-text">
          <strong>Nordic Art Archive</strong>
          <small>Showcasing Nordic Excellence</small>
        </span>
      </a>

      <div class="header-actions">
        <nav id="auth-links" class="nav-links" aria-label="Main navigation"></nav>
      </div>
    </div>
  </header>

  <main class="page-shell auth-shell">
    <section class="auth-card">
      <div class="auth-icon">↪</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to manage your artworks</p>

      <div id="message" class="alert hidden" aria-live="polite"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
         
          <p class="field-error" data-error-for="email"></p>
        </div>
        <input
  id="email"
  name="email"
  type="email"
  class="form-input"
  placeholder="you@stud.noroff.no"
  required
/>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-input"
            placeholder="Enter your password"
            required
            minlength="8"
          />
          <p class="field-error" data-error-for="password"></p>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>

      <p class="auth-meta">
        Don't have an account?
        <a href="./register.html">Create one now</a>
      </p>

      <div class="note-card">
        <strong>Testing note:</strong>
        <p>
          Using the Noroff API requires a valid account. Register first, then log in.
        </p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Nordic Art Archive. Created by Snezana Kragujevac</p>
    </div>
  </footer>
</body>
</html>
